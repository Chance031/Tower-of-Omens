name: Update README Gantt Chart

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/gantt.svg'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/update_gantt.py

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/gantt.svg
          git diff --staged --quiet || git commit -m "docs: README 자동 업데이트 [skip ci]"
          git push
